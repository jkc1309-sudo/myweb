<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CV | Kecheng Jin</title>
    <meta
      name="description"
      content="Downloadable CV for Kecheng Jin, Ph.D. student in Human-Computer Interaction at Zhejiang University."
    />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="script.js"></script>
    <style>
      .cv-viewer {
        max-width: var(--max-width);
        margin: 0 auto;
        display: grid;
        gap: 20px;
      }

      .cv-viewer__actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: flex-end;
      }

      .cv-viewer__frame {
        position: relative;
        width: 100%;
        aspect-ratio: 1 / 1.35;
        max-height: 85vh;
        border-radius: 24px;
        overflow: hidden;
        background: var(--tile, #f5f5f7);
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 12px 40px rgba(0, 0, 0, 0.08);
      }

      .cv-viewer__frame iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }

      .cv-viewer__fallback {
        padding: 24px;
        text-align: center;
        font-size: 0.95rem;
        color: var(--muted, #6e6e73);
      }

      body[data-page="cv"] .page-intro {
        padding-top: 45px;
        padding-bottom: 45px;
      }

      body[data-page="cv"] .page-intro .eyebrow {
        margin-bottom: 0;
      }

      @media (max-width: 720px) {
        .cv-viewer__frame {
          aspect-ratio: 1 / 1.6;
          border-radius: 18px;
        }

        .cv-viewer__actions {
          justify-content: center;
        }
      }
    </style>
  </head>
  <body data-page="cv">
    <div class="site-shell">
      <header class="site-header">
        <a class="brand" href="index.html">
          <span class="brand-mark">KJ</span>
          <span class="brand-text">
            <strong>Kecheng Jin</strong>
            <span>HCI / Generative AI / Interactive Systems</span>
          </span>
        </a>
        <button class="menu-toggle" type="button" aria-expanded="false" aria-label="Toggle navigation">
          <span></span>
          <span></span>
        </button>
        <nav class="site-nav">
          <a href="index.html">Home</a>
          <a href="projects.html">Projects</a>
          <a href="publications.html">Publications</a>
          <a href="cv.html">CV</a>
        </nav>
      </header>

      <main>
        <section class="page-intro reveal">
          <p class="eyebrow">CV</p>
          <p class="lead">
            Preview the full CV below, or download a copy for later reading.
          </p>
        </section>

        <section class="section reveal">
          <div class="cv-viewer">
            <div class="cv-viewer__actions">
              <a class="button button-primary" href="Jin_CV.pdf" download="Jin_CV.pdf">Download PDF</a>
              <a class="button button-secondary" href="Jin_CV.pdf" target="_blank" rel="noopener">Open in new tab</a>
            </div>
            <div class="cv-viewer__frame">
              <iframe
                src="Jin_CV.pdf#view=FitH"
                title="CV of Kecheng Jin"
                loading="lazy"
              ></iframe>
              <noscript>
                <p class="cv-viewer__fallback">
                  Your browser cannot display the embedded PDF. <a href="Jin_CV.pdf">Download the CV</a> instead.
                </p>
              </noscript>
            </div>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <p>Kecheng Jin</p>
      </footer>
    </div>
  </body>
</html>
